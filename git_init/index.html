<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">待办事项</h1>
      <p class="subtitle">记录今天要做的事</p>
    </header>

    <form class="add-form" id="add-form" autocomplete="off">
      <label for="task-input" class="visually-hidden">新任务</label>
      <input
        type="text"
        id="task-input"
        class="task-input"
        placeholder="输入任务，按 Enter 添加"
        maxlength="500"
      />
      <button type="submit" class="btn btn-primary">添加</button>
    </form>

    <div class="toolbar" role="tablist" aria-label="筛选任务">
      <button type="button" class="filter-btn is-active" data-filter="all" role="tab" aria-selected="true">全部</button>
      <button type="button" class="filter-btn" data-filter="active" role="tab" aria-selected="false">未完成</button>
      <button type="button" class="filter-btn" data-filter="completed" role="tab" aria-selected="false">已完成</button>
    </div>

    <ul class="task-list" id="task-list" aria-live="polite"></ul>

    <footer class="footer">
      <span class="count" id="task-count"></span>
      <button type="button" class="btn btn-text" id="clear-completed" hidden>清除已完成</button>
    </footer>
  </div>

  <template id="task-template">
    <li class="task-item">
      <label class="task-check">
        <input type="checkbox" class="task-checkbox" />
        <span class="task-text"></span>
      </label>
      <button type="button" class="btn btn-icon delete-btn" aria-label="删除任务">删除</button>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
